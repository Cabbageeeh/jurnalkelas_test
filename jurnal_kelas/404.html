<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 — Halaman Tidak Ditemukan</title>
    <link rel="stylesheet" href="css/style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <style>
      body {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #4f46e5, #7c3aed);
      }

      .error-box {
        background: white;
        border-radius: 24px;
        padding: 56px 48px;
        text-align: center;
        max-width: 440px;
        width: 90%;
        box-shadow: 0 24px 60px rgba(0, 0, 0, 0.2);
        animation: fadeInUp 0.5s ease;
      }

      .error-code {
        font-size: 96px;
        font-weight: 800;
        background: linear-gradient(135deg, #4f46e5, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        line-height: 1;
        margin-bottom: 16px;
      }

      .error-title {
        font-size: 1.5rem;
        font-weight: 700;
        color: #1f2937;
        margin-bottom: 10px;
      }

      .error-desc {
        color: #6b7280;
        font-size: 0.95rem;
        margin-bottom: 32px;
        line-height: 1.6;
      }

      .error-actions {
        display: flex;
        gap: 12px;
        justify-content: center;
        flex-wrap: wrap;
      }

      @keyframes fadeInUp {
        from {
          opacity: 0;
          transform: translateY(24px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
    </style>
  </head>
  <body>
    <div class="error-box">
      <div class="error-code">404</div>
      <h1 class="error-title">Halaman Tidak Ditemukan</h1>
      <p class="error-desc">
        Halaman yang Anda cari tidak ada atau Anda tidak memiliki akses ke
        halaman ini.
      </p>
      <div class="error-actions">
        <a href="index.html" class="btn btn-primary">
          <i class="fas fa-house"></i> Ke Halaman Login
        </a>
        <button class="btn btn-outline" onclick="history.back()">
          <i class="fas fa-arrow-left"></i> Kembali
        </button>
      </div>
    </div>
  </body>
</html>
